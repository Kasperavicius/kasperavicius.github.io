<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            :root {
            --color-bg: #0c0c0c;
            --color-surface: #1a1a1a;
            --color-border: #2a2a2a;
            --color-text: #aaa;
            --color-text-bright: #fff;
            --color-page-bg: #ffffff;
            }

            @font-face {
            font-family: 'VT323';
            src: url('fonts/VT323-Regular.ttf');
            }

            @keyframes rgb-shift {
                0%   { color: #ff0000; }
                25%  { color: #00ff00; }
                50%  { color: #0000ff; }
                75%  { color: #ff00ff; }
                100% { color: #ff0000; }
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                background: var(--color-page-bg);
                font-family: 'VT323', monospace;
            }

            header {
                display: flex;
                align-items: stretch;
                background: var(--color-bg);
                position: fixed;
                top: 0;
                width: 100%;
                height: 64px;
                padding: 0 40px;
            }

            .nav-links {
                display: flex;
                align-items: stretch;
            }

            .nav-links a, .nav-contact {
                color: var(--color-text);
                text-decoration: none;
                font-size: 26px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                padding: 0 26px;
                display: flex;
                align-items: center;
                transition: all 0.2s ease;
            }

            .nav-links a:hover, .nav-contact:hover {
                color: var(--color-text-bright);
                background: var(--color-surface);
                animation: rgb-shift 7s linear infinite;
            }

            .nav-contact {
                margin-left: auto;
                margin-right: 8px;
            }

            .nav-social {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .nav-social a {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 40px;
                border: 1px solid var(--color-border);
                color: var(--color-text);
                text-decoration: none;
                transition: all 0.2s ease;
            }

            .nav-social a:hover {
                color: var(--color-text-bright);
                border-color: var(--color-text-bright);
                background: var(--color-surface);
            }

            .pixel-line {
                position: fixed;
                top: 64px;
                width: 100%;
                height: 6px;
                background-image: repeating-linear-gradient(
                    90deg,
                    #ffffff 0px,
                    #ffffff 8px,
                    #0d0d0d 8px,
                    #0d0d0d 16px
                );
                background-size: 16px 100%;
                z-index: 999;
            }

            .pixel-line.scrolling {
                animation: pixel-scroll 0.6s linear infinite;
            }

            .theme-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 64px;
                background: none;
                border: none;
                color: var(--color-text);
                font-size: 20px;
                cursor: pointer;
                transition: all 0.2s ease;
                margin-left: 8px;
            }

            .theme-toggle:hover {
                color: var(--color-text-bright);
                background: var(--color-surface);
            }

            body.light-mode {
                --color-bg: #f0f0f0;
                --color-surface: #e0e0e0;
                --color-border: #cccccc;
                --color-text: #555;
                --color-text-bright: #000;
                --color-page-bg: #ffffff;
            }

        </style>
    </head>
    <body>
        <header>
            <nav class="nav-links">
                <a href="/">Home</a>
                <a href="/page2.html">Skills</a>
                <a href="/page3.html">Projects</a>
                <a href="/resume.pdf">Resume</a>
            </nav>

            <a href="/contact.html" class="nav-contact">Contact Me</a>

            <div class="nav-social">
                <a href="https://github.com/kasperavicius" target="_blank"></a>
                <a href="#TODO" target="_blank"></a>
                <a href="#TODO" target="_blank"></a>
            </div>

            <button class="theme-toggle" onclick="toggleTheme()">?</button>

        </header>

        <div class="pixel-line"></div>

        <script>
            function toggleTheme() {
                document.body.classList.toggle('light-mode');
                const btn = document.querySelector('.theme-toggle');
                btn.textContent = document.body.classList.contains('light-mode') ? '?' : '?';
            }

            <!-- Pixel Line Animation Start -->

            const pixelLine = document.querySelector('.pixel-line');
            let position = 0;
            let speed = 0;
            let targetSpeed = 0;

            function animate() {
                speed += (targetSpeed - speed) * 0.08;
                position += speed;

                pixelLine.style.backgroundPosition = position + "px 0";

                requestAnimationFrame(animate);
            }

            animate();

            function startScrolling() {
                targetSpeed = 2;
            }

            function slowdownScrolling() {
                targetSpeed = 0;
            }
            
            document.querySelectorAll('.nav-links a, .nav-contact, .nav-social a, .theme-toggle').forEach(el => {
                el.addEventListener('mouseenter', startScrolling);
                el.addEventListener('mouseleave', slowdownScrolling);
            });

            document.querySelectorAll('.nav-links a, .nav-contact').forEach(link => {
                link.addEventListener('mouseenter', () => {
                    const randomDelay = -(Math.random() * 7) + 's';
                    link.style.animationDelay = randomDelay;
                });
            });
        </script>

    </body>
</html>
