<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            @font-face {
            font-family: 'VT323';
            src: url('fonts/VT323-Regular.ttf');
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                background: #ffffff;
                font-family: 'VT323', monospace;
            }

            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 24px 40px;
                background: #0d0d0d;
                border-bottom: 1px solid #2a2a2a;
                position: fixed;
                top: 0;
                width: 100%;
            }

            .nav-links {
                display: flex;
                gap: 8px;
            }

            .nav-links a {
                color: #aaa;
                text-decoration: none;
                font-size: 13px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                padding: 8px 16px;
                border: 1px solid #2a2a2a;
                transition: all 0.2s ease;
            }

            .nav-links a:hover {
                color: #fff;
                border-color: #fff;
                background: #1a1a1a;
            }

            .nav-social {
                display: flex;
                gap: 8px;
            }

            .nav-social a {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 40px;
                border: 1px solid #2a2a2a;
                color: #aaa;
                text-decoration: none;
                transition: all 0.2s ease;
            }

            .nav-social a:hover {
                color: #fff;
                border-color: #fff;
                background: #1a1a1a;
            }
        </style>
    </head>
    <body>
        <header>
            <nav class="nav-links">
                <a href="/page1.html">Page 1</a>
                <a href="/page2.html">Page 2</a>
                <a href="/page3.html">Page 3</a>
                <a href="/page4.html">Page 4</a>
            </nav>

            <div class="nav-social">
                <a href="https://github.com/kasperavicius" target="_blank">GitHub</a>
                <a href="#TODO" target="_blank">LinkedIn</a>
                <a href="#TODO">Email</a>
            </div>
        </header>
    </body>
</html>
