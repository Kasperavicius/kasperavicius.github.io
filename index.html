<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            :root {
            --color-bg: #0d0d0d;
            --color-surface: #1a1a1a;
            --color-border: #2a2a2a;
            --color-text: #aaa;
            --color-text-bright: #fff;
            --color-page-bg: #ffffff;
            }

            @font-face {
            font-family: 'VT323';
            src: url('fonts/VT323-Regular.ttf');
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                background: var(--color-page-bg);
                font-family: 'VT323', monospace;
            }

            header {
                display: flex;
                align-items: stretch;
                background: var(--color-bg);
                position: fixed;
                top: 0;
                width: 100%;
                height: 64px;
                padding: 0 40px;
            }

            .nav-links {
                display: flex;
                align-items: stretch;
            }

            .nav-links a, .nav-contact {
                color: var(--color-text);
                text-decoration: none;
                font-size: 26px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                padding: 0 26px;
                display: flex;
                align-items: center;
                transition: all 0.2s ease;
            }

            .nav-links a:hover, .nav-contact:hover {
                color: var(--color-text-bright);
                background: var(--color-surface);
            }

            .nav-contact {
                margin-left: auto;
                margin-right: 8px;
            }

            .nav-social {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .nav-social a {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 40px;
                height: 40px;
                border: 1px solid var(--color-border);
                color: var(--color-text);
                text-decoration: none;
                transition: all 0.2s ease;
            }

            .nav-social a:hover {
                color: var(--color-text-bright);
                border-color: var(--color-text-bright);
                background: var(--color-surface);
            }

            .pixel-line {
            position: fixed;
            top: 64px;
            width: 100%;
            height: 6px;
            background-image: repeating-linear-gradient(
                90deg,
                #ffffff 0px,
                #ffffff 6px,
                #0d0d0d 6px,
                #0d0d0d 16px
            );
            z-index: 999;
            }

        </style>
    </head>
    <body>
        <header>
            <nav class="nav-links">
                <a href="/">Home</a>
                <a href="/page2.html">Skills</a>
                <a href="/page3.html">Projects</a>
                <a href="/resume.html">Resume</a>
            </nav>

            <a href="/contact.html" class="nav-contact">Contact Me</a>

            <div class="nav-social">
                <a href="https://github.com/kasperavicius" target="_blank"></a>
                <a href="#TODO" target="_blank"></a>
                <a href="#TODO" target="_blank"></a>
            </div>
        </header>
        <div class="pixel-line"></div>
    </body>
</html>
